# === Claude Code / TUI 互換性 ===
# 制御シーケンスを外側のターミナルへ通す（通知・進捗表示・連携用）
set -g allow-passthrough on

# Shift+Enter などの拡張キー入力を有効化（エラー時はこの行と次行を外す）
set -s extended-keys on

# xterm 系で拡張キー（Shift/Ctrl/Alt+Enter）を判別可能にする
set -as terminal-features 'xterm*:extkeys'

# teammate agents をペインとして扱う補正（既定 on だが明示）
set -g claude-code-fix-tty on

# スクロールしてもコピー・ペーストモードに入らない（スクロールは外側のターミナルで行うため）
set -g scroll-enter-copy-mode off

# Claude Code fullscreen のマウススクロールには mouse on が必要
set -g mouse on

# === 長時間セッション向け ===
# スクロールバック行数（増やしすぎるとメモリ増。50000 目安）
set -g history-limit 50000

# コマンド終了後もペインを閉じない（エラー確認用。閉じるは kill-pane）
set -g remain-on-exit on

# 非アクティブウィンドウの出力を検知（並行セッションの変化に気づく）
set -g monitor-activity on

# 検知したアクティビティを視覚的に通知
set -g visual-activity on

# ベル通知を全ウィンドウで扱う
set -g bell-action any

# === ウィンドウ整理 ===
# ウィンドウを閉じた後に番号を詰め直す（0,1,3 → 0,1,2）
set -g renumber-windows on

# 実行中コマンドに応じてウィンドウ名を自動更新
set -g automatic-rename on

# === Alt キーバインド（Prefix なし）===
# Alt+n: 左右分割し、右ペインで Claude Code 起動
bind-key -n M-n split-window -h -c "#{pane_current_path}" -- "pwsh -NoExit -NoProfile -Command claude" \; select-layout tiled

# Alt+v: 上下分割し、下ペインで Claude Code 起動
bind-key -n M-v split-window -v -c "#{pane_current_path}" -- "pwsh -NoExit -NoProfile -Command claude" \; select-layout tiled

# Alt+m: 同じディレクトリで新規ウィンドウを作成（シェルを開く）
bind-key -n M-m new-window -c "#{pane_current_path}"

# Alt+z: ペインの最大化トグル
bind-key -n M-z resize-pane -Z

# Alt+w: 確認してからペインを閉じる
bind-key -n M-w confirm-before -p 'kill pane #P? (y/n)' kill-pane

# Alt+r: 設定を再読み込みして反映
bind-key -n M-r source-file ~/.psmux.conf \; display-message "psmux config reloaded"
